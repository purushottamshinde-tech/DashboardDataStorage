name: 🤖 Metabase to GitHub Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch, Merge and Correct Script
        run: |
          python3 << 'EOF'
          import requests
          import csv
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          # March 2026 Corrected Rates
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          print("📥 Downloading Data...")
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # 1. ORGANIZE DN DUMP BY CUSTOMER (SSE ID)
          dn_items = {}
          for row in csv.DictReader(StringIO(dn_csv)):
              sid = row.get('customer', '').strip()
              if not sid: continue
              if sid not in dn_items:
                  dn_items[sid] = []
              dn_items[sid].append(row)

          # 2. PERFORM FLAT JOIN
          merged = []
          # These are the columns from OMS that must come first
          oms_base_headers = [
              'SSE ID', 'Installation Completion Date', 'Cell Name', 'City', 'State', 
              'Project Size (kW)', 'Offer Type', 'Phase Connection', 'System Price (Rs.)', 
              'Total Price (Rs.)', 'Cost Escalation', 'Other Charges', 'Discount', 
              'EMI Processing Fees', 'Additional Cable Length Cost', 
              'Additional Inverter Position Cost', 'Metering (Config Driven)', 
              'Final Revenue', 'Final Revenue Excl. GST'
          ]
          
          # These are the columns from DN Dump that follow
          dn_headers = [
              'parent', 'item_category', 'item_subcategory', 'item_code', 
              'item_name', 'qty', 'rate', 'amount', 'Delivery Note Status', 'posting_date'
          ]

          for oms_row in csv.DictReader(StringIO(oms_csv)):
              sse_id = oms_row.get('SSE ID', '').strip()
              items = dn_items.get(sse_id, [])

              if not items:
                  # Create a blank entry for projects with no DN data yet
                  blank_dn = {h: '' for h in dn_headers}
                  merged.append({**oms_row, **blank_dn})
              else:
                  for item in items:
                      # Combine OMS data with this specific Item data
                      combined = {**oms_row}
                      for h in dn_headers:
                          combined[h] = item.get(h, '')

                      # 3. APPLY MARCH 2026 RATE CORRECTION
                      # Logic: If item_name matches the specific modules, override rate/amount
                      try:
                          iqty = float(combined.get('qty', 0) or 0)
                      except:
                          iqty = 0

                      if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(combined.get('item_name')):
                          combined['rate'] = RATE_545_NON_DCR
                          combined['amount'] = iqty * RATE_545_NON_DCR
                      elif "540 Wp Mono Bifacial DCR-PREMIER" in str(combined.get('item_name')):
                          combined['rate'] = RATE_540_DCR
                          combined['amount'] = iqty * RATE_540_DCR

                      merged.append(combined)

          # 4. SAVE FINAL CSV WITH SPECIFIC COLUMN ORDER
          if merged:
              # Final Header sequence: OMS Base -> DN Item Details -> Rest of OMS
              existing_keys = list(merged[0].keys())
              final_column_order = oms_base_headers + dn_headers
              for k in existing_keys:
                  if k not in final_column_order:
                      final_column_order.append(k)

              with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=final_column_order, extrasaction='ignore')
                  writer.writeheader()
                  writer.writerows(merged)
              print(f"🚀 Success! Created mastersheet.csv with {len(merged)} rows (Flat Join).")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main
