name: 🤖 Metabase to GitHub Sync (Final Optimized CSV)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch, Merge and Strip
        run: |
          python3 << 'EOF'
          import requests
          import csv
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          # March 2026 Rates
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # 1. Map DN Items (Link 'customer' to 'SSE ID')
          dn_items = {}
          for row in csv.DictReader(StringIO(dn_csv)):
              sid = row.get('customer', '').strip()
              if sid:
                  if sid not in dn_items: dn_items[sid] = []
                  dn_items[sid].append(row)

          # 2. THE 12 COLUMNS YOU REQUESTED (This keeps the file size SMALL)
          final_headers = [
              'SSE ID', 
              'Installation Completion Date', 
              'Cell Name', 
              'Final Revenue', 
              'Final Revenue Excl. GST',
              'item_code', 
              'item_name', 
              'item_category', 
              'item_subcategory', 
              'qty', 
              'rate', 
              'amount'
          ]

          # 3. FLAT JOIN
          merged = []
          for oms_row in csv.DictReader(StringIO(oms_csv)):
              sse_id = oms_row.get('SSE ID', '').strip()
              items = dn_items.get(sse_id, [])

              if not items:
                  # If no DN, one row with OMS data only
                  new_row = {h: oms_row.get(h, '') for h in final_headers}
                  merged.append(new_row)
              else:
                  for item in items:
                      # Create a row for every item
                      new_row = {h: oms_row.get(h, '') for h in final_headers}
                      
                      # Fill DN Details
                      new_row['item_code'] = item.get('item_code', '')
                      new_row['item_name'] = item.get('item_name', '')
                      new_row['item_category'] = item.get('item_category', '')
                      new_row['item_subcategory'] = item.get('item_subcategory', '')
                      new_row['qty'] = item.get('qty', '')
                      new_row['rate'] = item.get('rate', '')
                      new_row['amount'] = item.get('amount', '')

                      # 4. March 2026 RATE CORRECTION
                      try:
                          iqty = float(new_row['qty']) if new_row['qty'] else 0
                          if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(new_row['item_name']):
                              new_row['rate'] = RATE_545_NON_DCR
                              new_row['amount'] = iqty * RATE_545_NON_DCR
                          elif "540 Wp Mono Bifacial DCR-PREMIER" in str(new_row['item_name']):
                              new_row['rate'] = RATE_540_DCR
                              new_row['amount'] = iqty * RATE_540_DCR
                      except:
                          pass

                      merged.append(new_row)

          # 5. SAVE
          with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=final_headers, extrasaction='ignore')
              writer.writeheader()
              writer.writerows(merged)
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv
          git commit -m "Auto-update: $(date)" || echo "No changes"
          git push origin main
