name: 🤖 Metabase to GitHub Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This is the most important line
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch and Merge Script
        run: |
          python3 << 'EOF'
          import requests
          import csv
          from io import StringIO

          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106

          def get_metabase_session():
              response = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return response.json()['id']

          def fetch_csv(session_id, card_id):
              response = requests.post(f"{METABASE_URL}/api/card/{card_id}/query/csv", headers={"X-Metabase-Session": session_id})
              return response.text

          session = get_metabase_session()
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # Simple Merge Logic
          oms_data = list(csv.DictReader(StringIO(oms_csv)))
          dn_data = {list(row.values())[0]: row for row in csv.DictReader(StringIO(dn_csv))}

          merged = []
          for oms_row in oms_data:
              cid = list(oms_row.values())[0]
              if cid in dn_data:
                  merged.append({**oms_row, **dn_data[cid]})
              else:
                  merged.append(oms_row)

          if merged:
              with open("mastersheet.csv", "w", newline="") as f:
                  writer = csv.DictWriter(f, fieldnames=merged[0].keys())
                  writer.writeheader()
                  writer.writerows(merged)
              print(f"✅ Created file with {len(merged)} rows")
          EOF

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv
          git commit -m "Auto-update data: $(date)" || echo "No changes to commit"
          git push origin main
