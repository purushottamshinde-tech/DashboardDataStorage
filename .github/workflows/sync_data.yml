name: 🤖 Metabase to GitHub Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch, Merge and Correct Script
        run: |
          python3 << 'EOF'
          import requests
          import csv
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          # March 2026 Corrected Rates
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          print("📥 Downloading Data...")
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # 1. PROCESS DN DUMP 
          # We now use 'customer' from your SQL as the link to 'SSE ID'
          dn_lookup = {}
          for row in csv.DictReader(StringIO(dn_csv)):
              sid = row.get('customer', '').strip() 
              if not sid: continue
              
              if sid not in dn_lookup:
                  dn_lookup[sid] = {}
              
              # Pivoting items into the main row
              cat = row.get('item_category', 'Other').replace(" ", "_")
              dn_lookup[sid][f'DN_{cat}_Qty'] = row.get('qty')
              dn_lookup[sid][f'DN_{cat}_Rate'] = row.get('rate')
              dn_lookup[sid][f'DN_{cat}_Total'] = row.get('amount')
              dn_lookup[sid]['DN_Last_Posting_Date'] = row.get('posting_date')
              dn_lookup[sid]['DN_Latest_Status'] = row.get('Delivery Note Status')

          # 2. MERGE INTO OMS
          merged = []
          oms_rows = list(csv.DictReader(StringIO(oms_csv)))
          
          for oms_row in oms_rows:
              sse_id = oms_row.get('SSE ID', '').strip()
              dn_data = dn_lookup.get(sse_id, {})
              
              # Combine OMS row with matched DN data from 'customer' column
              combined = {**oms_row, **dn_data}

              # 3. APPLY MARCH 2026 RATE CORRECTIONS
              mod_name = combined.get('Module_Item_Name', '')
              qty_raw = combined.get('Module_Qty', 0)
              
              try:
                  qty = float(qty_raw) if qty_raw else 0
              except ValueError:
                  qty = 0

              if "545 Wp Mono Bifacial Non DCR-PREMIER" in mod_name:
                  combined['Module_Rate'] = RATE_545_NON_DCR
                  combined['Module_Total_Amount'] = qty * RATE_545_NON_DCR
              elif "540 Wp Mono Bifacial DCR-PREMIER" in mod_name:
                  combined['Module_Rate'] = RATE_540_DCR
                  combined['Module_Total_Amount'] = qty * RATE_540_DCR

              merged.append(combined)

          # 4. SAVE FINAL CSV
          if merged:
              # Dynamically build fieldnames to include all new DN columns
              all_keys = []
              for d in merged:
                  for k in d.keys():
                      if k not in all_keys:
                          all_keys.append(k)
                          
              with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=all_keys)
                  writer.writeheader()
                  writer.writerows(merged)
              print(f"🚀 Success! Created mastersheet.csv with {len(merged)} rows.")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes to commit"
          git push origin main
