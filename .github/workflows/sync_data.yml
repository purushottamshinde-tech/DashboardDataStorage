name: 🤖 Triple-File Sync (Master Data Fix)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Fetch, Merge, and Save
        run: |
          python3 << 'EOF'
          import requests
          import csv
          import gzip
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          print("📥 Fetching raw data...")
          raw_oms = fetch_csv(session, OMS_CARD_ID)
          raw_dn = fetch_csv(session, DN_DUMP_CARD_ID)

          # Save backups
          with gzip.open('oms_dump.csv.gz', 'wt') as f: f.write(raw_oms)
          with gzip.open('dn_dump.csv.gz', 'wt') as f: f.write(raw_dn)

          oms_rows = list(csv.DictReader(StringIO(raw_oms)))
          dn_rows = list(csv.DictReader(StringIO(raw_dn)))

          # 1. ORGANIZE DN DUMP BY CUSTOMER (The Join Key)
          dn_lookup = {}
          for row in dn_rows:
              # Logic: 'customer' is your DN Join Key
              sid = str(row.get('customer', '')).strip().upper()
              if sid:
                  if sid not in dn_lookup: dn_lookup[sid] = []
                  dn_lookup[sid].append(row)

          # 2. DEFINE OUTPUT HEADERS
          final_headers = [
              'SSE ID', 'Date', 'Cluster', 'Final Revenue', 
              'item_code', 'item_name', 'item_category', 'item_subcategory', 
              'qty', 'rate', 'amount'
          ]

          # 3. PERFORM THE JOIN (OMS sse_id <-> DN customer)
          merged = []
          for oms_row in oms_rows:
              # Logic: 'SSE ID' is your OMS Join Key (from Metabase header)
              sid = str(oms_row.get('SSE ID', '')).strip().upper()
              items = dn_lookup.get(sid, [])

              # Prepare the base data from OMS
              base_data = {
                  'SSE ID': sid,
                  'Date': oms_row.get('Installation Completion Date'),
                  'Cluster': oms_row.get('Cell Name'),
                  'Final Revenue': oms_row.get('Final Revenue')
              }

              if not items:
                  # If no delivery items, create one row with empty DN columns
                  row_data = {**base_data}
                  for h in final_headers[4:]: row_data[h] = ''
                  merged.append(row_data)
              else:
                  for item in items:
                      row_data = {**base_data}
                      row_data['item_code'] = item.get('item_code', '')
                      row_data['item_name'] = item.get('item_name', '')
                      row_data['item_category'] = item.get('item_category', '')
                      row_data['item_subcategory'] = item.get('item_subcategory', '')
                      row_data['qty'] = item.get('qty', '')
                      row_data['rate'] = item.get('rate', '')
                      row_data['amount'] = item.get('amount', '')

                      # March 2026 Rate Correction
                      try:
                          iqty = float(row_data['qty'] or 0)
                          if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(row_data['item_name']):
                              row_data['rate'] = RATE_545_NON_DCR
                              row_data['amount'] = iqty * RATE_545_NON_DCR
                          elif "540 Wp Mono Bifacial DCR-PREMIER" in str(row_data['item_name']):
                              row_data['rate'] = RATE_540_DCR
                              row_data['amount'] = iqty * RATE_540_DCR
                      except: pass
                      merged.append(row_data)

          # 4. SAVE MASTERSHEET
          with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=final_headers, extrasaction='ignore')
              writer.writeheader()
              writer.writerows(merged)
          
          print(f"🚀 Success! Created mastersheet.csv with {len(merged)} rows.")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv oms_dump.csv.gz dn_dump.csv.gz
          git commit -m "Auto-update: Joined Mastersheet $(date)" || echo "No changes"
          git push origin main
