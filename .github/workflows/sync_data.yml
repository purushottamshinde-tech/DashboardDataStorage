name: 🤖 Metabase to GitHub Sync (Optimized CSV)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch, Merge and Filter CSV
        run: |
          python3 << 'EOF'
          import requests
          import csv
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          # March 2026 Rates
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          print("📥 Downloading Data...")
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # 1. ORGANIZE DN DUMP (Linking 'customer' to 'SSE ID')
          dn_items = {}
          for row in csv.DictReader(StringIO(dn_csv)):
              sid = row.get('customer', '').strip()
              if not sid: continue
              if sid not in dn_items: dn_items[sid] = []
              dn_items[sid].append(row)

          # 2. DEFINE YOUR 12 SPECIFIC COLUMNS
          # This list acts as a 'filter' to keep the file size small
          final_headers = [
              'SSE ID', 'Installation Completion Date', 'Cell Name', 
              'Final Revenue', 'Final Revenue Excl. GST',
              'item_code', 'item_name', 'item_category', 'item_subcategory', 
              'qty', 'rate', 'amount'
          ]

          # 3. PERFORM FLAT JOIN
          merged_rows = []
          for oms_row in csv.DictReader(StringIO(oms_csv)):
              sse_id = oms_row.get('SSE ID', '').strip()
              items = dn_items.get(sse_id, [])

              if not items:
                  # Keep OMS info, blank DN info
                  new_row = {h: oms_row.get(h, '') for h in final_headers}
                  merged_rows.append(new_row)
              else:
                  for item in items:
                      # One row for every item delivered
                      new_row = {h: oms_row.get(h, '') for h in final_headers}
                      
                      # Map DN columns specifically
                      new_row['item_code'] = item.get('item_code', '')
                      new_row['item_name'] = item.get('item_name', '')
                      new_row['item_category'] = item.get('item_category', '')
                      new_row['item_subcategory'] = item.get('item_subcategory', '')
                      new_row['qty'] = item.get('qty', '')
                      new_row['rate'] = item.get('rate', '')
                      new_row['amount'] = item.get('amount', '')

                      # 4. RATE CORRECTION Logic
                      try:
                          iqty = float(new_row['qty']) if new_row['qty'] else 0
                          if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(new_row['item_name']):
                              new_row['rate'] = RATE_545_NON_DCR
                              new_row['amount'] = iqty * RATE_545_NON_DCR
                          elif "540 Wp Mono Bifacial DCR-PREMIER" in str(new_row['item_name']):
                              new_row['rate'] = RATE_540_DCR
                              new_row['amount'] = iqty * RATE_540_DCR
                      except:
                          pass

                      merged_rows.append(new_row)

          # 5. SAVE TO mastersheet.csv
          if merged_rows:
              with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=final_headers, extrasaction='ignore')
                  writer.writeheader()
                  writer.writerows(merged_rows)
              print(f"✅ Success! Created mastersheet.csv with {len(merged_rows)} rows.")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv
          git commit -m "Auto-update CSV: $(date)" || echo "No changes"
          git push origin main
