name: 🤖 Metabase to GitHub Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch, Merge and Save
        run: |
          python3 << 'EOF'
          import requests, csv, gzip, shutil, os, json, time
          from io import StringIO
          from datetime import datetime, timezone
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          # --- CONFIG ---
          METABASE_URL     = "https://metabase-lighthouse.solarsquare.in"
          USERNAME         = "devika.g@solarsquare.in"
          PASSWORD         = "Devika@2025"
          OMS_CARD_ID      = 2154
          DN_CARD_ID       = 2106

          # --- COLUMN MAPPING ---
          # Mapping Python internal names to your SQL Aliases
          OMS_COLS = {
              'SSE ID'                        : 'SSE ID',
              'Installation Completion Date'  : 'Installation Completion Date',
              'Cell Name'                     : 'Cell Name',
              'City'                          : 'City',
              'State'                         : 'State',
              'Project Size (kW)'             : 'Project Size (kW)',
              'Offer Type'                    : 'Offer Type',
              'Phase Connection'              : 'Phase Connection',
              'Final Revenue'                 : 'Final Revenue',
              'Final Revenue Excl. GST'       : 'Final Revenue Excl. GST',
          }

          # Updated to match your DN Dump SQL Aliases
          DN_COLS = {
              'customer'     : 'DN_SSE_ID',
              'posting_date' : 'posting_date',
              'Total_Amount' : 'amount',
              'Module'       : 'module_cost',
              'Inverter'     : 'inverter_cost'
          }

          FINAL_HEADERS = [
              'SSE ID', 'Installation Completion Date', 'Cell Name',
              'City', 'State', 'Project Size (kW)', 'Offer Type', 'Phase Connection',
              'Final Revenue', 'Final Revenue Excl. GST',
              'posting_date', 'amount', 'module_cost', 'inverter_cost'
          ]

          # --- HELPERS ---
          def make_http():
              s = requests.Session()
              retries = Retry(total=3, backoff_factor=30, status_forcelist=[502,503,504], allowed_methods=["POST"])
              s.mount("https://", HTTPAdapter(max_retries=retries))
              return s

          def get_session(http):
              r = http.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD}, timeout=60)
              r.raise_for_status()
              return r.json()['id']

          def fetch_csv(http, sid, cid, label="data"):
              for attempt in range(3):
                  try:
                      print(f"  [{label}] Attempt {attempt+1}/3 ...")
                      r = http.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid}, timeout=600)
                      r.raise_for_status()
                      print(f"  [{label}] OK — {len(r.text):,} chars")
                      return r.text
                  except Exception as e:
                      print(f"  [{label}] Error: {e}")
                      if attempt == 2: raise
                      time.sleep(30)

          # --- EXECUTION ---
          http    = make_http()
          session = get_session(http)

          print("Fetching OMS data...")
          raw_oms = fetch_csv(http, session, OMS_CARD_ID, label="OMS")
          print("Fetching DN data...")
          raw_dn  = fetch_csv(http, session, DN_CARD_ID,  label="DN")

          oms_rows = list(csv.DictReader(StringIO(raw_oms)))
          dn_rows  = list(csv.DictReader(StringIO(raw_dn)))

          # Create lookup for DN data indexed by customer ID
          dn_lookup = {row['customer'].strip().upper(): row for row in dn_rows if row.get('customer')}

          merged = []
          for oms in oms_rows:
              sse_id = oms.get('SSE ID', '').strip().upper()
              dn_data = dn_lookup.get(sse_id, {})

              # Build the final row
              row = {}
              # Fill OMS Data
              for csv_col, internal_name in OMS_COLS.items():
                  row[internal_name] = oms.get(csv_col, '')
              
              # Fill DN Data (COGS)
              row['posting_date'] = dn_data.get('posting_date', '')
              row['amount']       = dn_data.get('Total_Amount', 0)
              row['module_cost']  = dn_data.get('Module', 0)
              row['inverter_cost']= dn_data.get('Inverter', 0)
              
              merged.append(row)

          # --- STORAGE ---
          TMP  = "/tmp/data_tmp.csv"
          GZ   = "data.csv.gz"
          META = "data_meta.json"

          with open(TMP, "w", newline="", encoding="utf-8") as f:
              w = csv.DictWriter(f, fieldnames=FINAL_HEADERS, extrasaction='ignore')
              w.writeheader()
              w.writerows(merged)

          with open(TMP, 'rb') as f_in, gzip.open(GZ, 'wb', compresslevel=9) as f_out:
              shutil.copyfileobj(f_in, f_out)

          meta = {
              "last_updated" : datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "total_rows"   : len(merged),
              "oms_rows"     : len(oms_rows),
          }
          with open(META, "w") as f:
              json.dump(meta, f, indent=2)
          EOF

      - name: Generate projects JSON
        run: |
          # Ensure this script exists in your repo or add its logic here
          python3 generate_projects_json.py

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.csv.gz data_meta.json projects.json.gz
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main
          git push origin main
