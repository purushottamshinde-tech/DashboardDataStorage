name: 🤖 Metabase to GitHub Sync (JSON Optimized)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch and Create JSON
        run: |
          python3 << 'EOF'
          import requests
          import csv
          import json
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          # March 2026 Rates
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # 1. Map DN Items (Using 'customer' as the SSE ID key)
          dn_lookup = {}
          for row in csv.DictReader(StringIO(dn_csv)):
              sid = row.get('customer', '').strip()
              if not sid: continue
              
              # Apply Rate Correction
              qty = float(row.get('qty', 0) or 0)
              if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(row.get('item_name')):
                  row['rate'] = RATE_545_NON_DCR
                  row['amount'] = qty * RATE_545_NON_DCR
              elif "540 Wp Mono Bifacial DCR-PREMIER" in str(row.get('item_name')):
                  row['rate'] = RATE_540_DCR
                  row['amount'] = qty * RATE_540_DCR

              if sid not in dn_lookup: dn_lookup[sid] = []
              dn_lookup[sid].append(row)

          # 2. Build Nested JSON
          final_output = []
          for oms_row in csv.DictReader(StringIO(oms_csv)):
              sid = oms_row.get('SSE ID', '').strip()
              
              project_entry = {
                  "sse_id": sid,
                  "date": oms_row.get("Installation Completion Date"),
                  "cluster": oms_row.get("Cell Name"),
                  "revenue": oms_row.get("Final Revenue"),
                  "revenue_excl_gst": oms_row.get("Final Revenue Excl. GST"),
                  "city": oms_row.get("City"),
                  "state": oms_row.get("State"),
                  "delivery_items": dn_lookup.get(sid, []) # This is the nested list
              }
              final_output.append(project_entry)

          # 3. Write to File
          with open("data.json", "w", encoding='utf-8') as f:
              json.dump(final_output, f, indent=2)
          
          print(f"✅ Success! Created data.json with {len(final_output)} projects.")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Auto-update JSON: $(date)" || echo "No changes"
          git push origin main
