name: 🤖 Triple-File Sync (OMS, DN, & Mastersheet)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Fetch, Merge, and Save 3 Files
        run: |
          python3 << 'EOF'
          import requests
          import csv
          import gzip
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          print("📥 Fetching raw data from Metabase...")
          raw_oms_text = fetch_csv(session, OMS_CARD_ID)
          raw_dn_text = fetch_csv(session, DN_DUMP_CARD_ID)

          # --- FILE 1 & 2: SAVE RAW DUMPS (Compressed to stay under 100MB) ---
          with gzip.open('oms_dump.csv.gz', 'wt', encoding='utf-8') as f:
              f.write(raw_oms_text)
          with gzip.open('dn_dump.csv.gz', 'wt', encoding='utf-8') as f:
              f.write(raw_dn_text)

          # --- FILE 3: CREATE THE 12-COLUMN MASTERSHEET ---
          oms_data = list(csv.DictReader(StringIO(raw_oms_text)))
          dn_data = list(csv.DictReader(StringIO(raw_dn_text)))

          dn_lookup = {}
          for row in dn_data:
              sid = str(row.get('customer', '')).strip().upper()
              if sid:
                  if sid not in dn_lookup: dn_lookup[sid] = []
                  dn_lookup[sid].append(row)

          final_headers = [
              'SSE ID', 'Installation Completion Date', 'Cell Name', 
              'Final Revenue', 'Final Revenue Excl. GST',
              'item_code', 'item_name', 'item_category', 'item_subcategory', 
              'qty', 'rate', 'amount'
          ]

          merged = []
          for oms_row in oms_data:
              sse_id = str(oms_row.get('SSE ID', '')).strip().upper()
              items = dn_lookup.get(sse_id, [])

              if not items:
                  new_row = {h: oms_row.get(h, '') for h in final_headers}
                  merged.append(new_row)
              else:
                  for item in items:
                      new_row = {h: oms_row.get(h, '') for h in final_headers}
                      new_row['item_code'] = item.get('item_code', '')
                      new_row['item_name'] = item.get('item_name', '')
                      new_row['item_category'] = item.get('item_category', '')
                      new_row['item_subcategory'] = item.get('item_subcategory', '')
                      new_row['qty'] = item.get('qty', '')
                      new_row['rate'] = item.get('rate', '')
                      new_row['amount'] = item.get('amount', '')

                      # Rate Correction
                      try:
                          iqty = float(new_row['qty'] or 0)
                          if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(new_row['item_name']):
                              new_row['rate'] = RATE_545_NON_DCR
                              new_row['amount'] = iqty * RATE_545_NON_DCR
                          elif "540 Wp Mono Bifacial DCR-PREMIER" in str(new_row['item_name']):
                              new_row['rate'] = RATE_540_DCR
                              new_row['amount'] = iqty * RATE_540_DCR
                      except: pass
                      merged.append(new_row)

          with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
              writer = csv.DictWriter(f, fieldnames=final_headers, extrasaction='ignore')
              writer.writeheader()
              writer.writerows(merged)
          
          print(f"🚀 Successfully created 3 files: oms_dump.csv.gz, dn_dump.csv.gz, and mastersheet.csv")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv oms_dump.csv.gz dn_dump.csv.gz
          git commit -m "Auto-update: Triple File Sync $(date)" || echo "No changes"
          git push origin main
