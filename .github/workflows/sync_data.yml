name: 🤖 Metabase to GitHub Sync

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
        
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
            
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
            
      - name: Install dependencies
        run: pip install requests
            
      - name: Run Fetch, Merge and Correct Script
        run: |
          python3 << 'EOF'
          import requests
          import csv
          from io import StringIO

          # --- CONFIG ---
          METABASE_URL = "https://metabase-lighthouse.solarsquare.in"
          USERNAME = "devika.g@solarsquare.in"
          PASSWORD = "Devika@2025"
          OMS_CARD_ID = 2154
          DN_DUMP_CARD_ID = 2106
          
          # March 2026 Corrected Rates
          RATE_545_NON_DCR = 8134.52
          RATE_540_DCR = 12065.00

          def get_session():
              res = requests.post(f"{METABASE_URL}/api/session", json={"username": USERNAME, "password": PASSWORD})
              return res.json()['id']

          def fetch_csv(sid, cid):
              res = requests.post(f"{METABASE_URL}/api/card/{cid}/query/csv", headers={"X-Metabase-Session": sid})
              return res.text

          session = get_session()
          print("📥 Downloading Data...")
          oms_csv = fetch_csv(session, OMS_CARD_ID)
          dn_csv = fetch_csv(session, DN_DUMP_CARD_ID)

          # 1. ORGANIZE DN DUMP BY CUSTOMER (Link to SSE ID)
          dn_items = {}
          for row in csv.DictReader(StringIO(dn_csv)):
              # We use 'customer' from your SQL to link to 'SSE ID'
              sid = row.get('customer', '').strip()
              if not sid: continue
              if sid not in dn_items:
                  dn_items[sid] = []
              dn_items[sid].append(row)

          # 2. DEFINE THE OUTPUT FORMAT & COLUMN ORDER
          # Order: sseid, date, cluster, category, subcat, item code, item name, qty, rate, amount, revenue
          final_headers = [
              'SSE ID', 'Installation Completion Date', 'Cell Name', 'item_category', 
              'item_subcategory', 'item_code', 'item_name', 'qty', 'rate', 'amount', 
              'Final Revenue', 'Final Revenue Excl. GST', 'parent', 'City', 'State', 
              'Project Size (kW)', 'Offer Type', 'Phase Connection', 'Delivery Note Status'
          ]

          # 3. PERFORM FLAT JOIN
          merged = []
          for oms_row in csv.DictReader(StringIO(oms_csv)):
              sse_id = oms_row.get('SSE ID', '').strip()
              items = dn_items.get(sse_id, [])

              if not items:
                  # If no DN found, keep 1 row with blank DN info but full revenue
                  row_data = {**oms_row}
                  # Ensure these keys exist even if empty
                  for h in ['item_category', 'item_subcategory', 'item_code', 'item_name', 'qty', 'rate', 'amount', 'parent']:
                      row_data[h] = ''
                  merged.append(row_data)
              else:
                  for item in items:
                      # Duplicate OMS/Revenue data for every single item in DN Dump
                      row_data = {**oms_row}
                      
                      # Mapping DN Dump columns to the keys used in the CSV
                      row_data['parent'] = item.get('parent', '')
                      row_data['item_category'] = item.get('item_category', '')
                      row_data['item_subcategory'] = item.get('item_subcategory', '')
                      row_data['item_code'] = item.get('item_code', '')
                      row_data['item_name'] = item.get('item_name', '')
                      row_data['qty'] = item.get('qty', '')
                      row_data['rate'] = item.get('rate', '')
                      row_data['amount'] = item.get('amount', '')
                      row_data['Delivery Note Status'] = item.get('Delivery Note Status', '')

                      # 4. APPLY MARCH 2026 RATE CORRECTION
                      try:
                          iqty = float(row_data.get('qty', 0) or 0)
                      except:
                          iqty = 0

                      if "545 Wp Mono Bifacial Non DCR-PREMIER" in str(row_data.get('item_name')):
                          row_data['rate'] = RATE_545_NON_DCR
                          row_data['amount'] = iqty * RATE_545_NON_DCR
                      elif "540 Wp Mono Bifacial DCR-PREMIER" in str(row_data.get('item_name')):
                          row_data['rate'] = RATE_540_DCR
                          row_data['amount'] = iqty * RATE_540_DCR

                      merged.append(row_data)

          # 5. SAVE
          if merged:
              with open("mastersheet.csv", "w", newline="", encoding='utf-8') as f:
                  writer = csv.DictWriter(f, fieldnames=final_headers, extrasaction='ignore')
                  writer.writeheader()
                  writer.writerows(merged)
              print(f"✅ Success! Created flat itemized mastersheet.csv with {len(merged)} rows.")
          EOF

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add mastersheet.csv
          git commit -m "Auto-update: $(date +'%Y-%m-%d %H:%M')" || echo "No changes"
          git push origin main
